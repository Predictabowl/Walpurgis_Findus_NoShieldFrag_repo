name: Create Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create PK3 and Zip
        run: |
          # Create the pk3 file from the Walpurgis_Findus_NoShieldFrag folder
          cd Walpurgis_Findus_NoShieldFrag
          zip -r ../Walpurgis_Findus_NoShieldFrag.pk3 .
          cd ..
          
          # Create the final zip containing README.txt and the .pk3 file
          zip Walpurgis_Findus_NoShieldFrag.zip README.txt Walpurgis_Findus_NoShieldFrag.pk3

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Walpurgis_Findus_NoShieldFrag.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
